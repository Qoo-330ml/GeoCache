version: "3.9"

services:
  geocache-db:
    image: postgres:16-alpine
    container_name: geocache-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=geocache
      - POSTGRES_PASSWORD=geocache
      - POSTGRES_DB=geocache
      - TZ=Asia/Shanghai
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U geocache -d geocache"]
      interval: 10s
      timeout: 5s
      retries: 5

  geocache-api:
    build: .
    container_name: geocache-api
    restart: unless-stopped
    depends_on:
      geocache-db:
        condition: service_healthy
    environment:
      - APP_ENV=prod
      - DATABASE_URL=postgresql+psycopg://geocache:geocache@geocache-db:5432/geocache
      - API_KEYS=change_me_api_key
      - TZ=Asia/Shanghai
    volumes:
      - ./data:/app/data
    ports:
      - "18080:8080"
