# 本地开发版 GeoCache（使用 SQLite，无需 Docker）
version: "3.9"

services:
  geocache-api:
    build: .
    container_name: geocache-api
    restart: unless-stopped
    environment:
      - APP_ENV=prod
      - DATABASE_URL=sqlite:///./data/geocache.db
      - API_KEYS=change_me_api_key
      - TZ=Asia/Shanghai
    ports:
      - "18080:8080"

